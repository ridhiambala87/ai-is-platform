kind = "web"
previewPath = "/"
title = "AI-IS Research Platform"
version = "1.0.0"
id = "artifacts/ai-is-platform"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23515

[services.development]
run = "pnpm --filter @workspace/ai-is-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-is-platform", "run", "build" ]
serve = "static"
publicDir = "artifacts/ai-is-platform/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23515"
BASE_PATH = "/"
